<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="loader" class="is-hidden"></div>
    <section class="pets-section">
      <div class="container">
        <h2 class="section-title">Наші хвостики</h2>
        <p class="section-subtitle">Вони дуже чекають на знайомство з вами</p>
        <ul class="filter-list" id="filter-list">
          <li>
            <button class="filter-btn active" data-category="all">Всі</button>
          </li>
        </ul>
        <ul class="pets-list" id="pets-list"></ul>
        <button type="button" class="load-more-btn" id="load-more">
          Показати більше
        </button>
      </div>
    </section>

    <!-- Модальне вікно -->
    <div class="modal-backdrop is-hidden" id="modal-pet">
      <div class="modal-content">
        <button type="modal-close" id="modal-close">×</button>
        <div id="modal-data"></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
